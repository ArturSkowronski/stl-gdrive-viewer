<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STL Gallery</title>
  <link rel="preload" href="manifest.json" as="fetch" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-row toolbar-row--top">
      <h1>STL Gallery</h1>
      <span id="count" class="count" aria-live="polite"></span>
    </div>
    <input
      id="search"
      type="search"
      placeholder="Szukaj modelu…"
      autocomplete="off"
      spellcheck="false">
    <div class="filters">
      <div id="releases" class="chips" aria-label="Filtruj po release"></div>
      <button
        id="saturn-filter"
        class="chip chip-saturn"
        type="button"
        aria-pressed="false"
        title="Pokaż tylko modele z plikami pod Elegoo Saturn 4 Ultra"
        hidden>
        Saturn 4 Ultra
      </button>
    </div>
  </header>

  <main>
    <p id="status" class="status" hidden></p>
    <ul id="grid" class="grid" aria-busy="true">
      <li class="card skeleton">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-body">
          <div class="skeleton-line skeleton-line--short"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line skeleton-line--btn"></div>
        </div>
      </li>
      <li class="card skeleton">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-body">
          <div class="skeleton-line skeleton-line--short"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line skeleton-line--btn"></div>
        </div>
      </li>
      <li class="card skeleton">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-body">
          <div class="skeleton-line skeleton-line--short"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line skeleton-line--btn"></div>
        </div>
      </li>
      <li class="card skeleton">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-body">
          <div class="skeleton-line skeleton-line--short"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line skeleton-line--btn"></div>
        </div>
      </li>
    </ul>
  </main>

  <footer>
    <span id="meta"></span>
    <span id="legend" class="legend" hidden></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
