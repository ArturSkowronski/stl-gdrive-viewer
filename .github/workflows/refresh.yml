name: Refresh gallery

# Daily incremental refresh: only NEW model folders pay the cover-fetching
# + thumbnail-generation cost. Already-indexed models are read out of the
# previous run's manifest (restored from the actions/cache key
# `gallery-state-*`). Use the `Rebuild gallery from scratch` workflow
# when you need every cover and STL list re-picked from current Drive
# state — for example after fixing a heuristic in selector.py.

on:
  push:
    branches: [main]
  schedule:
    # 02:00 UTC Mon–Sat (~03:00–04:00 Poland time, middle of the night).
    # Sunday is reserved for the full `Rebuild gallery` workflow which
    # walks the same Drive, re-picks every cover, and writes a fresh
    # cache the Monday refresh resumes from.
    - cron: "0 2 * * 1-6"
  workflow_dispatch:
    inputs:
      root_folder_id:
        description: "Drive folder ID to scan (overrides GDRIVE_ROOT_FOLDER_ID variable). Paste the ID from drive.google.com/drive/folders/<ID>."
        required: false
        type: string
        default: "15F2OsqqekNu3C8MpdhMtsAcuZl5OwCDX"
      limit:
        description: "Limit to first N models (debug, leave empty for all)"
        required: false
        type: string
      analyze:
        description: "Diagnostic mode: dump cover-selection CSV as artifact instead of building the gallery"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scanner/requirements.txt

      - name: Install deps
        run: pip install -r scanner/requirements.txt

      - name: Restore previous gallery state
        id: gallery-cache
        if: ${{ inputs.analyze != true }}
        uses: actions/cache/restore@v4
        with:
          path: |
            site/manifest.json
            site/thumbs
          key: gallery-state-${{ github.run_id }}
          restore-keys: |
            gallery-state-

      - name: Scan Drive and build manifest
        env:
          # Set GOOGLE_API_KEY for public folders (preferred). Otherwise set
          # the three OAuth secrets. The scanner auto-detects which is present.
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          # Final fallback matches the dispatch input default so cron/push
          # work out of the box without needing GDRIVE_ROOT_FOLDER_ID variable.
          ROOT_FOLDER_ID: ${{ inputs.root_folder_id || vars.GDRIVE_ROOT_FOLDER_ID || '15F2OsqqekNu3C8MpdhMtsAcuZl5OwCDX' }}
          LIMIT: ${{ inputs.limit }}
          ANALYZE: ${{ inputs.analyze }}
        run: |
          args=(--root "$ROOT_FOLDER_ID" -v)
          if [ -n "$LIMIT" ]; then
            args+=(--limit "$LIMIT")
          fi
          if [ "$ANALYZE" = "true" ]; then
            args+=(--analyze cover-analysis.csv --out /tmp/manifest.json --thumbs /tmp/thumbs)
          else
            # --incremental skips cover/thumb work for folder_ids already
            # in site/manifest.json (restored from cache above).
            args+=(--incremental --out site/manifest.json --thumbs site/thumbs)
          fi
          python -m scanner.scan "${args[@]}"

      - name: Save updated gallery state
        if: ${{ inputs.analyze != true && success() }}
        uses: actions/cache/save@v4
        with:
          path: |
            site/manifest.json
            site/thumbs
          key: gallery-state-${{ github.run_id }}

      - name: Upload analysis CSV
        if: ${{ inputs.analyze == true }}
        uses: actions/upload-artifact@v4
        with:
          name: cover-analysis
          path: cover-analysis.csv

      - uses: actions/configure-pages@v5
        if: ${{ inputs.analyze != true }}

      - uses: actions/upload-pages-artifact@v3
        if: ${{ inputs.analyze != true }}
        with:
          path: site

  deploy:
    needs: build
    if: ${{ inputs.analyze != true }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
